name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  WEBHOOK_SECRET: ci-test-secret-at-least-32-chars-long!!
  ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  preview:
    name: Vercel Preview Deployment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Vercel preview (handled by GitHub integration)
        run: |
          echo "Preview deployments are handled automatically by the Vercel GitHub integration."
          echo "No manual deployment step is required here."
